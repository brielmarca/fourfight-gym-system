name: Secret Scanning

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  compose-safety:
    name: Compose Safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Compose deployment safety
        run: scripts/check-compose-safety.sh

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
