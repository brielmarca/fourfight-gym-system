name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - run: mvn test
      - run: mvn -DskipTests package

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t fourfight-backend:ci ./backend

  flyway-migration:
    name: Flyway Migration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: fourfight_ci
          POSTGRES_USER: fourfight_ci
          POSTGRES_PASSWORD: fourfight_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run Flyway migration
        run: >
          mvn flyway:migrate
          -Dflyway.url=jdbc:postgresql://localhost:5432/fourfight_ci
          -Dflyway.user=fourfight_ci
          -Dflyway.password=fourfight_ci
      - name: Verify migration with Flyway info
        run: >
          mvn flyway:info
          -Dflyway.url=jdbc:postgresql://localhost:5432/fourfight_ci
          -Dflyway.user=fourfight_ci
          -Dflyway.password=fourfight_ci
