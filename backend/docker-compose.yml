version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gym-management-app
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:postgresql://postgres:5432/gymdb
      - DB_USERNAME=gymapp
      - DB_PASSWORD=${DB_APP_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_USERNAME=${REDIS_APP_USER}
      - REDIS_PASSWORD=${REDIS_APP_PASSWORD}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_EXPIRATION_MS=900000
      - JWT_REFRESH_EXPIRATION_MS=604800000
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - MFA_ENCRYPTION_KEY_BASE64=${MFA_ENCRYPTION_KEY_BASE64}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: gym-nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: gym-postgres
    environment:
      - POSTGRES_DB=gymdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - APP_DB_USER=gymapp
      - APP_DB_PASSWORD=${DB_APP_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
      - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./certs:/var/lib/postgresql/certs:ro
    ports: []
    networks:
      - database-network
    networks:
      - database-network
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
      - -c
      - max_connections=50
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=256MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gym-redis
    command: ["/bin/sh", "/scripts/redis-startup.sh"]
    expose:
      - "6379"
    volumes:
      - redis-data:/data
      - ./scripts/redis-startup.sh:/scripts/redis-startup.sh:ro
      - ./redis.acl:/data/redis.acl:ro
    networks:
      - backend-network
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_APP_PASSWORD=${REDIS_APP_PASSWORD}
      - REDIS_MONITOR_PASSWORD=${REDIS_MONITOR_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  backend-network:
    driver: bridge
  database-network:
    driver: bridge
    internal: true

volumes:
  postgres-data:
  redis-data:
  nginx-logs: