# Fail2Ban filter for Gym Auth failures
# Monitor POST /api/auth/login returning 401 or 403

[Definition]
failregex = ^<host> - - \[.*\] "POST /api/auth/login HTTP/1\.1" (401|403)
          ^<host> - - \[.*\] "POST /api/auth/refresh HTTP/1\.1" (401|403)
          ^<host> - - \[.*\] "POST /api/auth/register HTTP/1\.1" (400|409|500)
          ^<host> - - \[.*\] "POST /api/auth/mfa/validate HTTP/1\.1" (401|403)

ignoreregex =

datepattern = ^[%d:%m:%Y %H:%M:%S]